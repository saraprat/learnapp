<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lernkarten – EU-Länder & Blütenpflanzen</title>
  <meta name="description" content="Lern-App mit Karteikarten, Quiz, Tippen, Liste und dem Üben falscher Antworten. Themen: EU-Länder & Hauptstädte und Blütenpflanzen (Biologie)." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1 id="app-title">Lernkarten</h1>
    <p class="subtitle" id="app-subtitle"></p>
    <label class="topic-select">
      <span>Thema:</span>
      <select id="topic" aria-label="Thema wählen"></select>
    </label>
  </header>

  <nav class="modes" aria-label="Lernmodus wählen">
    <button class="mode-btn" data-mode="flashcards">Karteikarten</button>
    <button class="mode-btn" data-mode="quiz">Quiz</button>
    <button class="mode-btn" data-mode="type">Tippen</button>
    <button class="mode-btn" data-mode="list">Liste</button>
    <button class="mode-btn mode-btn--wrong" data-mode="wrong">Falsche üben <span id="wrong-count" class="badge">0</span></button>
  </nav>

  <main id="view" class="view" aria-live="polite"></main>

  <footer class="app-footer">
    <span id="progress" class="progress"></span>
    <button id="reset-wrong" class="link-btn" type="button" hidden>Falsche zurücksetzen</button>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
