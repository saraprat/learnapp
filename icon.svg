  <rect x="116" y="140" width="280" height="232" rx="28" fill="#ffffff"/>
  <rect x="116" y="140" width="280" height="64" rx="28" fill="#ffcc00"/>
  <rect x="116" y="176" width="280" height="28" fill="#ffcc00"/>
