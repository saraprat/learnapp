<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e54c8"/>
      <stop offset="1" stop-color="#002a80"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#56d685"/>
      <stop offset="1" stop-color="#21a55a"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund-Badge -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Hintere Karteikarte (leicht gedreht) -->
  <g transform="rotate(-8 256 300)">
    <rect x="150" y="206" width="212" height="196" rx="24" fill="#bcd0ff" opacity="0.55"/>
  </g>

  <!-- Vordere Karteikarte -->
  <rect x="146" y="214" width="220" height="200" rx="26" fill="#ffffff"/>
  <rect x="146" y="214" width="220" height="50" rx="26" fill="#ffcc00"/>
  <rect x="146" y="240" width="220" height="24" fill="#ffcc00"/>
  <!-- Textzeilen -->
  <rect x="178" y="300" width="156" height="18" rx="9" fill="#d8deee"/>
  <rect x="178" y="338" width="116" height="18" rx="9" fill="#d8deee"/>

  <!-- Sprössling, der aus der Karte wächst (Lernen = Wachsen) -->
  <g>
    <path d="M256 214 C256 168 256 150 256 132" stroke="#21a55a" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- linkes Blatt -->
    <path d="M256 168 C214 168 188 142 184 104 C228 106 256 130 256 168 Z" fill="url(#leaf)"/>
    <!-- rechtes Blatt -->
    <path d="M256 150 C298 150 326 122 332 82 C286 84 256 110 256 150 Z" fill="url(#leaf)"/>
  </g>

  <!-- kleine Blüte als Krönung -->
  <g transform="translate(256 86)">
    <circle cx="0" cy="-16" r="12" fill="#ff6d9a"/>
    <circle cx="15" cy="-5" r="12" fill="#ff6d9a"/>
    <circle cx="9" cy="13" r="12" fill="#ff6d9a"/>
    <circle cx="-9" cy="13" r="12" fill="#ff6d9a"/>
    <circle cx="-15" cy="-5" r="12" fill="#ff6d9a"/>
    <circle cx="0" cy="0" r="10" fill="#ffcc00"/>
  </g>
</svg>
